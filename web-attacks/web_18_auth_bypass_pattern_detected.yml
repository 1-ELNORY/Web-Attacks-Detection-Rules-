title: Auth Bypass Pattern Detected
id: c8a2e003-e350-43ef-80b7-d5900e4f73dc
status: experimental
description: Detects authentication bypass attempts via URI manipulation, path traversal,
  and administrative parameter tampering resulting in a 200 response
references: []
author: Ahmed Elnoury
date: 2025/01/01
tags:
- attack.defense_evasion
- attack.privilege_escalation
- attack.initial_access
- attack.t1562
- attack.t1548
- attack.t1190
logsource:
  category: webserver
detection:
  selection_uri:
    cs-uri|contains:
    - ../
    - /admin/
    - /config
    - /setup
    - autodiscover.xml
    - '%00'
    - '%0d'
    - '%0a'
    - ?admin=true
    - ?debug=1
  selection_status:
    sc-status: 200
  filter_legit:
    cs-uri|contains:
    - windowsupdate.com
    - microsoft.com
  condition: selection_uri and selection_status and not filter_legit
falsepositives:
- Legitimate admin access from authorized IP ranges or authenticated admin sessions
level: critical
