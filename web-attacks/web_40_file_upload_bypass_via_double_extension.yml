title: File Upload Bypass via Double Extension
id: cf6473b0-3a91-4b9e-8dea-87a371edd5b3
status: test
description: Detects file upload bypass attempts using double extensions, null byte
  injection, or .htaccess upload to execute malicious code on the web server
references: []
author: Ahmed Elnoury
date: 2025/01/01
tags:
- attack.defense_evasion
- attack.persistence
- attack.initial_access
- attack.t1036
- attack.t1505.003
- attack.t1190
logsource:
  category: webserver
detection:
  selection_method:
    cs-method:
    - POST
    - PUT
  selection_uri:
    cs-uri|re: \.(php[3-7]?|phtml|phar|jsp|aspx?|cgi|pl|py|sh)\.(jpe?g|png|gif|bmp|txt|pdf|docx?|zip|rar)|filename=.*\.(php[3-7]?|phtml|phar|jsp|aspx?)\.(jpe?g|png|gif|txt)|\.php\x00|\.htaccess
  condition: selection_method and selection_uri
falsepositives:
- Legitimate file processing applications that handle mixed-extension files
level: critical
