title: XXE Injection Attack
id: 347b2af2-8f32-4c3d-8be7-4264f58cd898
status: test
description: Detects XML External Entity (XXE) attack patterns in HTTP request bodies
references: []
author: Ahmed Elnoury
date: 2025/01/01
tags:
- attack.exfiltration
- attack.discovery
- attack.initial_access
- attack.t1041
- attack.t1083
- attack.t1190
logsource:
  category: webserver
detection:
  selection:
    cs-uri|re: (?i)(<!ENTITY[^>]*SYSTEM|<!ENTITY[^>]*PUBLIC|<!DOCTYPE[^>]*\[|SYSTEM\s*["'][^"']*://|file://|php://filter|php://input|expect://|data://text|<!ENTITY\s+%\s*\w+)
  condition: selection
falsepositives:
- Legitimate XML processing applications that use external entities
level: high
