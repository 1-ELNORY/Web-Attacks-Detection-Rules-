title: LaTeX Injection Attack
id: f1bf84ad-f12d-440e-b87d-647674193110
status: test
description: Detects LaTeX injection attacks targeting document generation endpoints
  to execute commands or read sensitive server files
references: []
author: Ahmed Elnoury
date: 2025/01/01
tags:
- attack.execution
- attack.discovery
- attack.initial_access
- attack.t1059
- attack.t1083
- attack.t1190
logsource:
  category: webserver
detection:
  selection_uri:
    cs-uri|re: /(invoice|statement|report|pdf|generate|export|create|render)
  selection_body:
    cs-uri|re: \\(input|include|lstinputlisting|write18|immediate|newwrite|openout)\{?.*(/etc/|/var/|/root/|\.env|\.git|config|database|secret|password)
  condition: selection_uri or selection_body
falsepositives:
- Legitimate document generation platforms with user-controlled template inputs
level: high
