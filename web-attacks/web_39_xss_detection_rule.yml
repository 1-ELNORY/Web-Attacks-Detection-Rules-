title: XSS Detection Rule
id: d5c3e93e-ae33-430a-8ce1-90bdcb81a9df
status: test
description: Detects Cross-Site Scripting (XSS) attack patterns in web requests with
  comprehensive coverage of script injection vectors
references: []
author: Ahmed Elnoury
date: 2025/01/01
tags:
- attack.credential_access
- attack.execution
- attack.initial_access
- attack.t1539
- attack.t1059.007
- attack.t1190
logsource:
  category: webserver
detection:
  selection:
    cs-uri|re: (?i)(<script|<iframe|<object|<embed|<svg|<img|javascript:|data:text/html|vbscript:|on\w+\s*=|eval\(|alert\(|prompt\(|confirm\(|document\.(cookie|write)|window\.location|\.innerHTML|fromCharCode|srcdoc=|<applet)
  condition: selection
falsepositives:
- Web application testing environments or HTML-accepting rich text editors
level: high
