title: Potential Credential Stuffing via Web Authentication Endpoint
id: 6d468bd6-54ac-4bc4-9151-de0ca8c196fe
status: experimental
description: Identifies credential stuffing attacks where a single source IP submits
  multiple unique credential pairs to a login endpoint resulting in 401/403 responses
references: []
author: Ahmed Elnoury
date: 2025/01/01
tags:
- attack.credential_access
- attack.t1110.004
logsource:
  category: webserver
detection:
  selection_method:
    cs-method: POST
  selection_uri:
    cs-uri|contains:
    - /login
    - /auth
    - /signin
  selection_status:
    sc-status:
    - 401
    - 403
  condition: selection_method and selection_uri and selection_status
falsepositives:
- Legitimate users with incorrect credentials or password manager failures
level: high
