title: GraphQL Reconnaissance - Introspection Query Detected
id: d090c9ea-556a-44de-9ac6-dd0726363e5c
status: test
description: Detects GraphQL introspection queries used by attackers to enumerate
  the full schema, types, and fields of a GraphQL API
references: []
author: Ahmed Elnoury
date: 2025/01/01
tags:
- attack.reconnaissance
- attack.discovery
- attack.t1595
- attack.t1082
logsource:
  category: webserver
detection:
  selection_method:
    cs-method: POST
  selection_uri:
    cs-uri|contains: /graphql
  selection_body:
    cs-uri|contains:
    - __schema
    - __type
    - introspectionQuery
  condition: selection_method and selection_uri
falsepositives:
- Authorized GraphQL API testing or development environments with introspection enabled
level: high
