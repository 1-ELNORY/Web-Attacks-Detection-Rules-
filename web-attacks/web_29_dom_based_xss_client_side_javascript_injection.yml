title: DOM-Based XSS - Client-Side JavaScript Injection
id: 72244754-f5c8-44b7-a5d1-3484ec374ecf
status: experimental
description: Detects suspicious JavaScript syntax and HTML tags within URL parameters
  indicating DOM-based XSS exploitation attempts
references: []
author: Ahmed Elnoury
date: 2025/01/01
tags:
- attack.initial_access
- attack.t1059.007
logsource:
  category: webserver
detection:
  selection_script:
    cs-uri|re: (?i)(<|%3C)script|javascript:|on\w+\s*=|srcdoc\s*=
  selection_dom:
    cs-uri|contains:
    - document.cookie
    - window.location
    - eval(
    - atob(
    - fetch(
    - XMLHttpRequest
  condition: selection_script or selection_dom
falsepositives:
- Legitimate JavaScript debugging or testing tools accessing URLs with script fragments
level: high
